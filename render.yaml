services:
  - type: web
    name: srv-d3hg4d0gjchc73afnu30
    env: node
    plan: free
    region: oregon
    buildCommand: npm install && npm rebuild
    startCommand: node server-postgres.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ENABLE_AUTO_CRON
        value: false
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mundopatas-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://sistemamundopatas.com
      - key: API_URL
        value: https://api.sistemamundopatas.com

databases:
  - name: mundopatas-db
    databaseName: mundopatas_veterinaria
    user: mundopatas_admin
    plan: free
    region: oregon
